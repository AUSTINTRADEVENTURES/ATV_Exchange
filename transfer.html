<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Send</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260601flw1">
</head>

<body>
<div class="app">
<h2>Send Money</h2>

<div class="nav">
<button onclick="goToPage('exchange.html')">Home</button>
<button onclick="goToPage('orders.html')">My Orders</button>
<button onclick="goToPage('profile.html')">Profile</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Internal Transfer</h3>
<select id="transferCurrency">
<option value="GHS">Cedis (GHS)</option>
<option value="NGN">Naira (NGN)</option>
</select>
<input id="transferAmount" type="text" inputmode="decimal" placeholder="Amount to send" oninput="formatAmountInput(this)">
<input id="recipientLookup" placeholder="Recipient ATV UID or username">
<div id="recipientPreview" class="recipient-preview hidden"></div>
<button id="transferBtn" onclick="submitInternalTransfer()">Send Money</button>
<div id="transferStatus" class="help"></div>
</div>

<div class="card">
<h3>Transfer History</h3>
<div id="transferHistory">Loading...</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260601flw1"></script>
</body>
</html>
