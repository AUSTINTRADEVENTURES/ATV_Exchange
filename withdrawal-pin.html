<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Withdrawal PIN</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260601netprod1">
</head>
<body>
<div class="app page-shell">
<div class="page-topbar">
<button class="back-btn" onclick="goToPage('settings.html')">Back</button>
<div><span class="admin-kicker">Security</span><h2>Withdrawal PIN</h2></div>
</div>
<section class="card">
<p>Create a private PIN used before withdrawals and UID transfers. Do not share this PIN with anyone.</p>
<div class="password-field"><input id="withdrawalPin" type="password" inputmode="numeric" maxlength="6" placeholder="Create 4-6 digit PIN"><button type="button" onclick="togglePasswordVisibility('withdrawalPin', this)" aria-label="Show PIN">&#128065;</button></div>
<div class="password-field"><input id="withdrawalPinConfirm" type="password" inputmode="numeric" maxlength="6" placeholder="Confirm PIN"><button type="button" onclick="togglePasswordVisibility('withdrawalPinConfirm', this)" aria-label="Show PIN">&#128065;</button></div>
<button onclick="saveWithdrawalPin()">Save PIN</button>
<button class="secondary-link" type="button" onclick="forgotWithdrawalPin()">Forgot PIN?</button>
<div id="withdrawalPinStatus" class="help"></div>
</section>
</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260601netprod1"></script>
</body>
</html>
