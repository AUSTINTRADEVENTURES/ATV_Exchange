<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Support</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260521successicons1">
</head>

<body>
<div class="app">
<h2>Support Chat</h2>

<div class="nav">
<button onclick="goToPage('exchange.html')">Home</button>
<button onclick="goToPage('orders.html')">My Orders</button>
<button onclick="goToPage('profile.html')">Profile</button>
<button onclick="goToPage('kyc.html')">KYC</button>
<button id="supportAdminBtn" class="hidden" onclick="goToPage('support-admin.html')">Support Inbox</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>In-App Chat</h3>
<div id="supportMessages" class="chat-box">Loading chat...</div>
<textarea id="supportMessageInput" placeholder="Type your message..."></textarea>
<button onclick="sendSupportMessage()">Send Message</button>
</div>

<div class="card">
<h3>Second Option</h3>
<p class="help">If chat is urgent, contact support on WhatsApp.</p>
<a class="button-link" target="_blank" href="https://wa.me/233542632169?text=Hello%20ATV%20Exchange%20support">Open WhatsApp Support</a>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260521successicons1"></script>
</body>
</html>
