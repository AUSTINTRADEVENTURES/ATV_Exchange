<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Admin Support Chat</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260521transferperm1">
</head>

<body>
<div class="app admin-shell">
<div class="admin-topbar">
<div>
<span class="admin-kicker">ATV Exchange Support</span>
<h1>Open Chat</h1>
<p>Reply to the selected customer conversation and update the issue status.</p>
</div>
<button class="admin-logout-btn" onclick="goToPage('support-admin.html')">Back to Inbox</button>
</div>

<section class="admin-queue-card">
<div class="admin-card-head">
<div>
<span class="admin-kicker">Conversation</span>
<h2>Support Chat Details</h2>
</div>
<select id="supportStatusSelect">
<option value="Open">Open</option>
<option value="Resolved">Resolved</option>
</select>
</div>
<div id="adminThreadTitle" class="help">Loading chat...</div>
<button onclick="updateSupportStatus()">Update Status</button>
<div id="adminSupportMessages" class="chat-box"></div>
<textarea id="adminSupportMessageInput" placeholder="Type admin reply..."></textarea>
<button onclick="sendAdminSupportMessage()">Send Reply</button>
</section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260521transferperm1"></script>
</body>
</html>
