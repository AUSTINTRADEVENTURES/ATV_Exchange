<!DOCTYPE html>
<html>
<head>
<title>Swift Exchange</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="./manifest.json">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:white;}
.app{padding:20px;}
.card{background:#1c2b36;padding:15px;border-radius:15px;margin-top:15px;}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#25D366;color:white;}
.hidden{display:none;}

.tx-card{background:#1c2b36;padding:15px;border-radius:12px;margin-top:12px;}
.status{padding:4px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-bottom:8px;}
.pending{background:#ffc107;color:black;}
.paid{background:#2196f3;}
.completed{background:#4caf50;}
.btn{padding:6px 10px;margin-top:5px;border:none;border-radius:6px;font-size:12px;}
.btn-paid{background:#2196f3;color:white;}
.btn-complete{background:#4caf50;color:white;}
.link{color:#00ffcc;text-decoration:none;}
</style>
</head>

<body>

<div class="app">

<h2>💱 Swift Exchange</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="appBox" class="hidden">

<button onclick="openDashboard()">📊 Dashboard</button>

<div class="card">
<select id="type" onchange="updateResult()">
<option value="cedis">Cedis → Naira</option>
<option value="naira">Naira → Cedis</option>
</select>

<input id="amount" placeholder="Amount" oninput="updateResult()">
<div id="result"></div>

<button onclick="goToPayment()">Continue</button>
</div>

<div class="card hidden" id="page2">

<div id="paymentBox"></div>

<input id="senderName" placeholder="Sender Name">
<input id="senderPhone" placeholder="Sender Phone">

<input id="accName" placeholder="Account Name">
<input id="bankName" placeholder="Bank Name">
<input id="accNumber" placeholder="Account Number">

<h4>Upload Receipt</h4>
<input type="file" id="receipt">

<button onclick="sendWhatsApp()">Confirm</button>

</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">

<input id="searchInput" placeholder="Search..." oninput="searchTx()">

<div id="transactions"></div>

</div>

</div>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBQiE6s-oBHwmFcBe_7ghcYb6hEZytTFXw",
authDomain: "atvexchange.firebaseapp.com",
projectId: "atvexchange",
storageBucket: "atvexchange.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

// LOGIN
function login(){
let email=emailInput.value;
let password=passwordInput.value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
})
.catch(()=>alert("Login failed"));
}

auth.onAuthStateChanged(user=>{
if(user){
loginBox.classList.add("hidden");
appBox.classList.remove("hidden");
}
});

// RATES
const yourCedisToNaira=116.27907;
const yourNairaToCedis=120.48193;

let convertedAmount=0;
let type="cedis";

function format(n){
return Number(n).toLocaleString(undefined,{minimumFractionDigits:2});
}

function updateResult(){
let amount=amountInput.value;
type=typeSelect.value;

if(!amount)return;

if(type==="cedis"){
convertedAmount=amount*yourCedisToNaira;
result.innerText=format(amount)+" → "+format(convertedAmount);
}else{
convertedAmount=amount/yourNairaToCedis;
result.innerText=format(amount)+" → "+format(convertedAmount);
}
}

function goToPayment(){
page2.classList.remove("hidden");
}

// SEND ORDER
async function sendWhatsApp(){

let amount=amountInput.value;
let senderName=senderNameInput.value;
let senderPhone=senderPhoneInput.value;

let accName=accNameInput.value;
let bankName=bankNameInput.value;
let accNumber=accNumberInput.value;

let file=document.getElementById("receipt").files[0];

if(!file) return alert("Upload receipt");

let orderID="ATV-"+Date.now();

// upload receipt
let ref=storage.ref("receipts/"+orderID);
await ref.put(file);
let url=await ref.getDownloadURL();

// save data
await db.collection("transactions").add({
orderID,type,amount,convertedAmount,
senderName,senderPhone,accName,bankName,accNumber,
receipt:url,status:"Pending",
date:new Date().toLocaleString()
});

// whatsapp
window.open("https://wa.me/233542632169?text=Order%20ID:%20"+orderID);
}

// DASHBOARD
let allTransactions=[];

function openDashboard(){
dashboard.classList.remove("hidden");

db.collection("transactions").get().then(snap=>{
allTransactions=[];
snap.forEach(doc=>{
let tx=doc.data();
tx.id=doc.id;
allTransactions.push(tx);
});
displayTransactions(allTransactions);
});
}

function displayTransactions(data){

if(data.length===0){
transactions.innerHTML="No data";
return;
}

let html="";

data.forEach(tx=>{

let statusClass="pending";
if(tx.status==="Paid") statusClass="paid";
if(tx.status==="Completed") statusClass="completed";

html+=`
<div class="tx-card">

<div class="status ${statusClass}">
${tx.status}
</div>

<div>Order: ${tx.orderID}</div>
<div>Sent: ${tx.amount}</div>
<div>Pay: ${tx.convertedAmount}</div>

<a href="${tx.receipt}" target="_blank" class="link">
View Receipt
</a>

<button class="btn btn-paid" onclick="markPaid('${tx.id}')">
Paid
</button>

<button class="btn btn-complete" onclick="markCompleted('${tx.id}')">
Complete
</button>

<div>${tx.date}</div>

</div>
`;
});

transactions.innerHTML=html;
}

// SEARCH
function searchTx(){
let val=searchInput.value.toLowerCase();

let filtered=allTransactions.filter(tx=>
(tx.orderID&&tx.orderID.toLowerCase().includes(val))||
(tx.accName&&tx.accName.toLowerCase().includes(val))
);

displayTransactions(filtered);
}

// STATUS
function markPaid(id){
db.collection("transactions").doc(id).update({status:"Paid"});
openDashboard();
}

function markCompleted(id){
db.collection("transactions").doc(id).update({status:"Completed"});
openDashboard();
}

// SW
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
