<!DOCTYPE html>
<html>
<head>
    <title>Swift Exchange</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="./manifest.json">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body {
            margin:0;
            font-family: Arial;
            background:#0f2027;
            color:white;
        }
        .app{padding:20px;}
        .card{
            background:#1c2b36;
            padding:15px;
            border-radius:15px;
            margin-top:15px;
        }
        input, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:10px;
            border:none;
        }
        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            background:#25D366;
            color:white;
        }
        .hidden{display:none;}
    </style>
</head>

<body>

<div class="app">

<h2>💱 Swift Exchange</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h3>Admin Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appBox" class="hidden">

<button onclick="openDashboard()">📊 Dashboard</button>

<div class="card">

<select id="type" onchange="updateResult()">
<option value="cedis">Cedis → Naira</option>
<option value="naira">Naira → Cedis</option>
</select>

<input id="amount" placeholder="Amount" oninput="updateResult()">

<div id="result"></div>

<button onclick="goToPayment()">Continue</button>

</div>

<div class="card hidden" id="page2">

<div id="paymentBox"></div>

<input id="senderName" placeholder="Sender Name">
<input id="senderPhone" placeholder="Sender Phone">

<input id="accName" placeholder="Account Name">
<input id="bankName" placeholder="Bank Name">
<input id="accNumber" placeholder="Account Number">

<button onclick="sendWhatsApp()">Confirm</button>

</div>

<div class="card hidden" id="dashboard">
<h3>Transactions</h3>
<div id="transactions"></div>
</div>

</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBQiE6s-oBHwmFcBe_7ghcYb6hEZytTFXw",
  authDomain: "atvexchange.firebaseapp.com",
  projectId: "atvexchange"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(()=>{
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("appBox").classList.remove("hidden");
    })
    .catch(()=>{
        alert("Login failed");
    });
}

// KEEP LOGIN STATE
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("appBox").classList.remove("hidden");
    }
});

// RATES
const yourCedisToNaira = 116.27907;
const yourNairaToCedis = 120.48193;

let convertedAmount=0;
let type="cedis";

function format(n){
    return Number(n).toLocaleString(undefined,{minimumFractionDigits:2});
}

function updateResult(){
    let amount=document.getElementById("amount").value;
    type=document.getElementById("type").value;

    if(!amount) return;

    if(type==="cedis"){
        convertedAmount=amount*yourCedisToNaira;
        result.innerText=format(amount)+" → "+format(convertedAmount);
    }else{
        convertedAmount=amount/yourNairaToCedis;
        result.innerText=format(amount)+" → "+format(convertedAmount);
    }
}

function goToPayment(){
    document.getElementById("page2").classList.remove("hidden");
}

function sendWhatsApp(){

    let amount=document.getElementById("amount").value;
    let senderName=document.getElementById("senderName").value;
    let accName=document.getElementById("accName").value;

    db.collection("transactions").add({
        type,amount,convertedAmount,senderName,accName,
        date:new Date().toLocaleString()
    });

    window.open("https://wa.me/233542632169");
}

// DASHBOARD
function openDashboard(){

    document.getElementById("dashboard").classList.remove("hidden");

    let container=document.getElementById("transactions");

    db.collection("transactions").get().then(snap=>{
        let html="";
        snap.forEach(doc=>{
            let tx=doc.data();
            html+=`${tx.type} - ${tx.amount}<br>`;
        });
        container.innerHTML=html;
    });
}

// SW
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
