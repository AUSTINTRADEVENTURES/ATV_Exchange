<!DOCTYPE html>
<html>
<head>
    <title>Swift Exchange</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f2027;
            color: white;
        }

        .app { padding: 20px; }

        .card {
            background: #1c2b36;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #25D366;
            color: white;
        }

        .result {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .hidden { display: none; }

        .payment {
            background: #2a3c48;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="app">

    <h2>💱 Swift Exchange</h2>

    <button onclick="openDashboard()">📊 Dashboard</button>

    <!-- PAGE 1 -->
    <div class="card" id="page1">

        <select id="type" onchange="updateResult()">
            <option value="cedis">Cedis → Naira</option>
            <option value="naira">Naira → Cedis</option>
        </select>

        <input type="number" id="amount" placeholder="Enter amount" oninput="updateResult()">

        <div class="result" id="result"></div>

        <button onclick="goToPayment()">Continue</button>

    </div>

    <!-- PAGE 2 -->
    <div class="card hidden" id="page2">

        <h3>Payment Details</h3>

        <div class="payment" id="paymentBox"></div>

        <h3>Sender Details</h3>
        <input id="senderName" placeholder="Sender Name">
        <input id="senderPhone" placeholder="Sender Phone">

        <h3>Receiving Account</h3>
        <input id="accName" placeholder="Account Name">
        <input id="bankName" placeholder="Bank Name">
        <input id="accNumber" placeholder="Account Number">

        <button onclick="sendWhatsApp()">Confirm on WhatsApp</button>

    </div>

    <!-- DASHBOARD -->
    <div class="card hidden" id="dashboard">
        <h3>📊 Transactions</h3>
        <div id="transactions"></div>
    </div>

</div>

<script>

// FIREBASE CONFIG (YOURS)
const firebaseConfig = {
  apiKey: "AIzaSyBQiE6s-oBHwmFcBe_7ghcYb6hEZytTFXw",
  authDomain: "atvexchange.firebaseapp.com",
  projectId: "atvexchange",
  storageBucket: "atvexchange.firebasestorage.app",
  messagingSenderId: "329015821953",
  appId: "1:329015821953:web:a4143f30b537e970432f80",
  measurementId: "G-K4GJ5N6K3C"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// RATES
const marketCedisToNaira = 117.647;
const marketNairaToCedis = 119.048;

const yourCedisToNaira = 116.27907;
const yourNairaToCedis = 120.48193;

let convertedAmount = 0;
let profit = 0;
let type = "cedis";

function format(num){
    return Number(num).toLocaleString(undefined,{minimumFractionDigits:2});
}

function updateResult(){
    let amount = document.getElementById("amount").value;
    type = document.getElementById("type").value;

    if(!amount) return;

    if(type === "cedis"){
        convertedAmount = amount * yourCedisToNaira;
        profit = amount * (marketCedisToNaira - yourCedisToNaira);

        document.getElementById("result").innerText =
        format(amount)+" GHS = "+format(convertedAmount)+" NGN";

    } else {
        convertedAmount = amount / yourNairaToCedis;
        profit = (amount / marketNairaToCedis) - convertedAmount;

        document.getElementById("result").innerText =
        format(amount)+" NGN = "+format(convertedAmount)+" GHS";
    }
}

function goToPayment(){
    let amount = document.getElementById("amount").value;
    if(!amount) return alert("Enter amount");

    let box = document.getElementById("paymentBox");

    if(type === "cedis"){
        box.innerHTML =
        `<b>Send GHS (MoMo)</b><br>
        0555736233<br>
        Name: God of JECOB<br><br>
        You Receive: ${format(convertedAmount)} NGN`;
    } else {
        box.innerHTML =
        `<b>Send NGN (Bank)</b><br><br>
        You Receive: ${format(convertedAmount)} GHS`;
    }

    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
}

function sendWhatsApp(){

    let amount = document.getElementById("amount").value;
    let senderName = document.getElementById("senderName").value;
    let senderPhone = document.getElementById("senderPhone").value;

    let accName = document.getElementById("accName").value;
    let bankName = document.getElementById("bankName").value;
    let accNumber = document.getElementById("accNumber").value;

    if(!senderName || !senderPhone) return alert("Enter sender details");
    if(!accName || !bankName || !accNumber) return alert("Enter account details");

    // SAVE TO FIREBASE
    db.collection("transactions").add({
        type,
        amount,
        convertedAmount,
        profit,
        senderName,
        senderPhone,
        accName,
        bankName,
        accNumber,
        date: new Date().toLocaleString()
    });

    let message =
`💱 NEW ORDER

Type: ${type}
Sent: ${format(amount)}
Receive: ${format(convertedAmount)}

Sender: ${senderName}
Phone: ${senderPhone}

Account: ${accName}
Bank: ${bankName}
No: ${accNumber}`;

    let phone = "233542632169";

    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(message));
}

// DASHBOARD
function openDashboard(){
    document.getElementById("dashboard").classList.remove("hidden");

    let container = document.getElementById("transactions");

    db.collection("transactions").get().then(snapshot => {

        if(snapshot.empty){
            container.innerHTML = "No transactions yet";
            return;
        }

        let html = "";

        snapshot.forEach(doc=>{
            let tx = doc.data();

            html += `
            <div style="margin:10px; background:#2a3c48; padding:10px; border-radius:10px;">
            ${tx.type}<br>
            Sent: ${tx.amount}<br>
            Pay: ${tx.convertedAmount}<br>
            Profit: ${tx.profit}<br>
            Name: ${tx.accName}<br>
            ${tx.date}
            </div>
            `;
        });

        container.innerHTML = html;
    });
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
