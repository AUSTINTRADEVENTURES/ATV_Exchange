<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="./manifest.json">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:white;}
.app{padding:20px;}
.card{background:#1c2b36;padding:15px;border-radius:15px;margin-top:15px;}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#25D366;color:white;}
.hidden{display:none;}

.tx-card{background:#1c2b36;padding:15px;border-radius:12px;margin-top:12px;}
.status{padding:5px 10px;border-radius:20px;font-size:12px;}
.pending{background:#ffc107;color:black;}
.paid{background:#2196f3;}
.completed{background:#4caf50;}
.link{color:#00ffcc;text-decoration:none;}
</style>
</head>

<body>

<div class="app">

<h2>💱 Swift Exchange</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="appBox" class="hidden">

<button onclick="openDashboard()">📊 Dashboard</button>

<!-- CONVERTER -->
<div class="card">

<select id="type">
<option value="cedis">Cedis → Naira</option>
<option value="naira">Naira → Cedis</option>
</select>

<input id="amount" placeholder="Enter amount" oninput="updateResult()">

<div id="result"></div>

<button onclick="goToPayment()">Continue</button>

</div>

<!-- PAYMENT -->
<div class="card hidden" id="paymentPage">

<div id="paymentBox"></div>

<h3>Sender Details</h3>
<input id="senderName" placeholder="Sender Name">
<input id="senderPhone" placeholder="Sender Phone">

<h3>Receiving Account</h3>
<input id="accName" placeholder="Account Name">
<input id="bankName" placeholder="Bank Name">
<input id="accNumber" placeholder="Account Number">

<h3>Upload Receipt</h3>
<input type="file" id="receipt">

<button onclick="submitOrder()">Submit Order</button>

</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">

<input id="searchInput" placeholder="Search..." oninput="searchTx()">

<div id="transactions"></div>

</div>

</div>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBQiE6s-oBHwmFcBe_7ghcYb6hEZytTFXw",
authDomain: "atvexchange.firebaseapp.com",
projectId: "atvexchange",
storageBucket: "atvexchange.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

// LOGIN FIX
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
appBox.style.display="block";
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>alert("Login failed"));
}

// FORMAT (COMMAS + DECIMALS)
function format(num){
return Number(num).toLocaleString(undefined,{
minimumFractionDigits:2,
maximumFractionDigits:2
});
}

// RATES
const rateCedis = 116.27907;
const rateNaira = 120.48193;

let converted = 0;

// CONVERSION
function updateResult(){

let amount = document.getElementById("amount").value;
let type = document.getElementById("type").value;

if(!amount) return;

if(type==="cedis"){
converted = amount * rateCedis;
result.innerText = format(amount)+" GHS = "+format(converted)+" NGN";
}else{
converted = amount / rateNaira;
result.innerText = format(amount)+" NGN = "+format(converted)+" GHS";
}
}

// PAYMENT PAGE
function goToPayment(){

let type = document.getElementById("type").value;

paymentPage.classList.remove("hidden");

if(type==="cedis"){
paymentBox.innerHTML = `
Send GHS (MoMo):<br>
0555736233<br>
Name: God of JECOB
`;
}else{
paymentBox.innerHTML = `
Send NGN (Bank Transfer)<br>
You will receive GHS via MoMo
`;
}
}

// ORDER
async function submitOrder(){

let file = receipt.files[0];
if(!file) return alert("Upload receipt");

let orderID = "ATV-"+Date.now();

let ref = storage.ref("receipts/"+orderID);
await ref.put(file);
let url = await ref.getDownloadURL();

await db.collection("transactions").add({
orderID,
amount: amount.value,
converted,
senderName: senderName.value,
accName: accName.value,
receipt: url,
status: "Pending",
date: new Date().toLocaleString()
});

window.open("https://wa.me/233542632169?text=Order%20ID:%20"+orderID);
}

// DASHBOARD
let allTransactions=[];

function openDashboard(){

dashboard.classList.remove("hidden");

db.collection("transactions").get().then(snap=>{

allTransactions=[];

snap.forEach(doc=>{
let tx = doc.data();
tx.id = doc.id;
allTransactions.push(tx);
});

displayTransactions(allTransactions);

});
}

// DISPLAY
function displayTransactions(data){

if(data.length===0){
transactions.innerHTML="No data";
return;
}

let html="";

data.forEach(tx=>{

let statusClass="pending";
if(tx.status==="Paid") statusClass="paid";
if(tx.status==="Completed") statusClass="completed";

html+=`
<div class="tx-card">

<div class="status ${statusClass}">
${tx.status}
</div>

<div><b>Order:</b> ${tx.orderID}</div>
<div><b>Sent:</b> ${format(tx.amount)}</div>
<div><b>Pay:</b> ${format(tx.converted)}</div>

<a href="${tx.receipt}" target="_blank" class="link">
View Receipt
</a>

<button onclick="markPaid('${tx.id}')">Paid</button>
<button onclick="markCompleted('${tx.id}')">Complete</button>

<div>${tx.date}</div>

</div>
`;
});

transactions.innerHTML=html;
}

// SEARCH
function searchTx(){

let val = searchInput.value.toLowerCase();

let filtered = allTransactions.filter(tx =>
(tx.orderID && tx.orderID.toLowerCase().includes(val)) ||
(tx.accName && tx.accName.toLowerCase().includes(val))
);

displayTransactions(filtered);
}

// STATUS
function markPaid(id){
db.collection("transactions").doc(id).update({status:"Paid"});
openDashboard();
}

function markCompleted(id){
db.collection("transactions").doc(id).update({status:"Completed"});
openDashboard();
}

// SW
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
