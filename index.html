<!DOCTYPE html>
<html>
<head>
    <title>Swift Exchange</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f2027;
            color: white;
        }

        .app {
            padding: 20px;
        }

        .card {
            background: #1c2b36;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #25D366;
            color: white;
            font-size: 16px;
        }

        .result {
            margin-top: 10px;
            font-size: 18px;
        }

        .hidden {
            display: none;
        }

        .payment {
            background: #2a3c48;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="app">

    <h2>💱 Swift Exchange</h2>

    <div class="card">

        <select id="type" onchange="updateResult()">
            <option value="cedis">Cedis → Naira</option>
            <option value="naira">Naira → Cedis</option>
        </select>

        <input type="number" id="amount" placeholder="Enter amount" oninput="updateResult()">

        <div class="result" id="result"></div>

        <button onclick="goToPayment()">Continue</button>

    </div>

    <div class="card hidden" id="paymentBox"></div>

</div>

<script>
const yourCedisToNaira = 116.27907;
const yourNairaToCedis = 120.48193;

let convertedAmount = 0;
let type = "cedis";

function format(num){
    return Number(num).toLocaleString(undefined,{minimumFractionDigits:2});
}

function updateResult(){
    let amount = document.getElementById("amount").value;
    type = document.getElementById("type").value;

    if(!amount) return;

    if(type === "cedis"){
        convertedAmount = amount * yourCedisToNaira;
        document.getElementById("result").innerText =
        format(amount)+" GHS = "+format(convertedAmount)+" NGN";
    } else {
        convertedAmount = amount / yourNairaToCedis;
        document.getElementById("result").innerText =
        format(amount)+" NGN = "+format(convertedAmount)+" GHS";
    }
}

function goToPayment(){
    let box = document.getElementById("paymentBox");

    box.classList.remove("hidden");

    if(type === "cedis"){
        box.innerHTML = `
        <div class="payment">
        <b>Send GHS (MoMo)</b><br>
        0555736233<br>
        Name: God of JECOB<br><br>

        You receive: ${format(convertedAmount)} NGN
        </div>
        `;
    } else {
        box.innerHTML = `
        <div class="payment">
        <b>Send NGN (Bank)</b><br><br>

        You receive: ${format(convertedAmount)} GHS
        </div>
        `;
    }
}

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("SW Registered"))
    .catch(err => console.log(err));
}
</script>

</body>
</html>
