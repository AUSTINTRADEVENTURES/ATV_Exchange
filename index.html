<!DOCTYPE html>
<html>
<head>
    <title>Swift Exchange</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f2027;
            color: white;
        }

        .app {
            padding: 20px;
        }

        .card {
            background: #1c2b36;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #25D366;
            color: white;
            font-size: 16px;
        }

        .result {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .hidden { display: none; }

        .payment {
            background: #2a3c48;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .admin {
            background: #1b5e20;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
        }

        h3 { margin-top: 0; }
    </style>
</head>

<body>

<div class="app">

    <h2>💱 Swift Exchange</h2>

    <!-- PAGE 1 -->
    <div class="card" id="page1">

        <select id="type" onchange="updateResult()">
            <option value="cedis">Cedis → Naira</option>
            <option value="naira">Naira → Cedis</option>
        </select>

        <input type="number" id="amount" placeholder="Enter amount" oninput="updateResult()">

        <div class="result" id="result"></div>

        <button onclick="goToPayment()">Continue</button>

    </div>

    <!-- PAGE 2 -->
    <div class="card hidden" id="page2">

        <h3>💳 Payment Details</h3>

        <div class="payment" id="paymentBox"></div>

        <h3>💳 Payment Verification</h3>
        <input type="text" id="senderName" placeholder="Name used to send payment">
        <input type="text" id="senderPhone" placeholder="Sender Phone / MoMo Number">

        <h3>🏦 Receiving Account</h3>
        <input type="text" id="accName" placeholder="Account Name">
        <input type="text" id="bankName" placeholder="Bank Name">
        <input type="text" id="accNumber" placeholder="Account Number">

        <button onclick="sendWhatsApp()">Confirm on WhatsApp</button>

    </div>

    <!-- ADMIN -->
    <div class="admin hidden" id="adminBox"></div>

</div>

<script>
// MARKET RATES
const marketCedisToNaira = 117.647;
const marketNairaToCedis = 119.048;

// YOUR RATES
const yourCedisToNaira = 116.27907;
const yourNairaToCedis = 120.48193;

let convertedAmount = 0;
let profit = 0;
let type = "cedis";

const isAdmin = window.location.search.includes("admin=true");

function format(num) {
    return Number(num).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function updateResult() {
    let amount = document.getElementById("amount").value;
    type = document.getElementById("type").value;

    if (!amount) return;

    if (type === "cedis") {
        convertedAmount = amount * yourCedisToNaira;
        profit = amount * (marketCedisToNaira - yourCedisToNaira);

        document.getElementById("result").innerText =
            format(amount) + " GHS = " + format(convertedAmount) + " NGN";

    } else {
        convertedAmount = amount / yourNairaToCedis;
        profit = (amount / marketNairaToCedis) - convertedAmount;

        document.getElementById("result").innerText =
            format(amount) + " NGN = " + format(convertedAmount) + " GHS";
    }
}

function goToPayment() {
    let amount = document.getElementById("amount").value;
    if (!amount) return alert("Enter amount");

    let box = document.getElementById("paymentBox");

    if (type === "cedis") {
        box.innerHTML = `
        <b>Send GHS (MoMo)</b><br>
        0555736233<br>
        Name: God of JECOB<br><br>
        <b>You Receive:</b> ${format(convertedAmount)} NGN
        `;
    } else {
        box.innerHTML = `
        <b>Send NGN (Bank Transfer)</b><br><br>
        <b>You Receive:</b> ${format(convertedAmount)} GHS<br><br>
        MTN MoMo: 0555736233
        `;
    }

    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");

    if (isAdmin) {
        document.getElementById("adminBox").classList.remove("hidden");
        document.getElementById("adminBox").innerHTML =
        `<h3>🔐 Admin Panel</h3>
        Profit: ${format(profit)}<br>
        Customer Pays: ${format(document.getElementById("amount").value)}<br>
        You Pay: ${format(convertedAmount)}`;
    }
}

function sendWhatsApp() {
    let amount = document.getElementById("amount").value;

    let senderName = document.getElementById("senderName").value;
    let senderPhone = document.getElementById("senderPhone").value;

    let accName = document.getElementById("accName").value;
    let bankName = document.getElementById("bankName").value;
    let accNumber = document.getElementById("accNumber").value;

    if (!senderName || !senderPhone) {
        return alert("Enter payment sender details");
    }

    if (!accName || !bankName || !accNumber) {
        return alert("Enter receiving account details");
    }

    let message =
`💱 NEW EXCHANGE ORDER

Type: ${type}
Customer Sent: ${format(amount)}
Customer Receives: ${format(convertedAmount)}

💳 PAYMENT DETAILS:
Name: ${senderName}
Phone: ${senderPhone}

🏦 RECEIVING ACCOUNT:
Name: ${accName}
Bank: ${bankName}
Account: ${accNumber}

✔ Awaiting confirmation`;

    let phone = "233542632169";

    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message));
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("SW Registered"));
}
</script>

</body>
</html>
