<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Support Inbox</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260530verifyisolate1">
</head>

<body>
<div class="app admin-shell">
<div class="admin-topbar">
<div>
<span class="admin-kicker">ATV Exchange Support</span>
<h1>Support Inbox</h1>
<p>Review customer conversations in a clean list. Open any chat to reply on a separate page.</p>
</div>
<button class="admin-logout-btn" onclick="logout()">Logout</button>
</div>

<div class="admin-nav">
<button onclick="goToPage('exchange.html')">Home</button>
<button onclick="goToPage('dashboard.html')">Dashboard</button>
<button onclick="goToPage('support.html')">My Chat</button>
</div>

<section class="admin-queue-card">
<div class="admin-card-head">
<div>
<span class="admin-kicker">Inbox</span>
<h2>Customer Support Chats</h2>
</div>
<input id="supportSearchInput" placeholder="Search support chats..." oninput="searchSupportThreads()">
</div>
<div id="supportThreads">Loading...</div>
</section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260530verifyisolate1"></script>
</body>
</html>
