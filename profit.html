<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Profit</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260613platformapi1">
</head>

<body>
<div class="app admin-shell profit-page">
<div class="admin-topbar">
<div>
<span class="admin-kicker">ATV Exchange Finance</span>
<h1>Profit Tracking</h1>
<p>Live completed-order profit analytics for admin eyes only.</p>
</div>
<button class="admin-logout-btn" onclick="logout()">Logout</button>
</div>

<div class="admin-nav">
<button onclick="goToPage('exchange.html')">Exchange</button>
<button onclick="goToPage('dashboard.html')">Dashboard</button>
<button onclick="goToPage('customers.html')">Customers</button>
<button onclick="goToPage('kyc-admin.html')">KYC Review</button>
<button onclick="goToPage('rates.html')">Rates</button>
</div>

<section class="profit-filter-card">
<div>
<span class="admin-kicker">Filters</span>
<h2>Completed Orders Only</h2>
</div>
<div class="profit-filter-grid">
<label>From
<input id="profitDateFrom" type="date" onchange="applyProfitFilters()">
</label>
<label>To
<input id="profitDateTo" type="date" onchange="applyProfitFilters()">
</label>
<label>Direction
<select id="profitDirectionFilter" onchange="applyProfitFilters()">
<option value="">All directions</option>
<option value="cedis">GHS to NGN</option>
<option value="naira">NGN to GHS</option>
</select>
</label>
</div>
</section>

<section class="profit-dashboard-card">
<div id="profitSummary">Loading profit data...</div>
</section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260613platformapi1"></script>
</body>
</html>
