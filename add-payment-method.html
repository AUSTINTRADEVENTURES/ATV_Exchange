<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Add Payment Method</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260522transfercustomer2">
</head>
<body>
<div class="app page-shell">
<div class="page-topbar">
<button class="back-btn" onclick="goToPage('payment-method.html')">Back</button>
<div><span class="admin-kicker">Wallet</span><h2>Add Payment Method</h2></div>
</div>
<section class="card">
<select id="preferredPaymentMethod">
<option value="">Select Payment Method</option>
<option value="mobile-money">Mobile Money</option>
<option value="bank-transfer">Bank Transfer</option>
<option value="wallet">Wallet</option>
</select>
<input id="paymentProvider" placeholder="Provider or Bank Name">
<input id="paymentAccountName" placeholder="Account Name">
<input id="paymentAccountNumber" placeholder="Account / Wallet Number">
<button onclick="savePaymentMethod()">Save Payment Method</button>
<div id="paymentMethodStatus" class="help"></div>
</section>
</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260522transfercustomer2"></script>
</body>
</html>
