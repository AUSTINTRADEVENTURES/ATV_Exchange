<!DOCTYPE html>
<html>
<head>
<title>Swift Exchange - Exchange</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css">
</head>

<body>
<div class="app">
<h2>Exchange</h2>

<div class="nav">
<button onclick="goToPage('exchange.html')">Exchange</button>
<button onclick="goToPage('profile.html')">Profile/KYC</button>
<button onclick="goToPage('orders.html')">My Orders</button>
<button id="dashboardBtn" class="hidden" onclick="goToPage('dashboard.html')">Dashboard</button>
<button id="profitBtn" class="hidden" onclick="goToPage('profit.html')">Profit</button>
<button id="customersBtn" class="hidden" onclick="goToPage('customers.html')">Customers</button>
<button id="kycBtn" class="hidden" onclick="goToPage('kyc-admin.html')">KYC Review</button>
<button id="ratesBtn" class="hidden" onclick="goToPage('rates.html')">Rates</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<select id="type" onchange="updateResult()">
<option value="cedis">Cedis -> Naira</option>
<option value="naira">Naira -> Cedis</option>
</select>

<input id="amount" type="number" placeholder="Enter amount" oninput="updateResult()">
<div id="result" class="result"></div>

<button onclick="saveExchangeAndContinue()">Continue</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js"></script>
</body>
</html>
