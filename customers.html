<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Customers</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260521successicons1">
</head>

<body>
<div class="app">
<h2>Customer Tracking</h2>

<div class="nav">
<button onclick="goToPage('exchange.html')">Exchange</button>
<button onclick="goToPage('dashboard.html')">Dashboard</button>
<button onclick="goToPage('profit.html')">Profit</button>
<button onclick="goToPage('kyc-admin.html')">KYC Review</button>
<button onclick="goToPage('rates.html')">Rates</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<input id="customerSearchInput" placeholder="Search customers..." oninput="searchCustomers()">
<div id="customersList"></div>
</div>

<div class="card">
<h3>Update Customer Balance</h3>
<input id="balanceCustomerId" placeholder="Customer ID">
<input id="balanceGhsInput" type="number" placeholder="GHS balance">
<input id="balanceNgnInput" type="number" placeholder="NGN balance">
<button onclick="saveCustomerBalance()">Save Balance</button>
<div id="balanceStatus" class="help"></div>
</div>

<div class="card">
<h3>Edit Customer Name By ID Number</h3>
<input id="editCustomerIdNumber" placeholder="Customer ID Number">
<input id="editFirstName" placeholder="New First Name">
<input id="editMiddleName" placeholder="New Middle Name">
<input id="editLastName" placeholder="New Last/Surname">
<button onclick="updateCustomerNameByIdNumber()">Update Customer Name</button>
<div id="nameEditStatus" class="help"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260521successicons1"></script>
</body>
</html>
