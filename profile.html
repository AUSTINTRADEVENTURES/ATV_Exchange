<!DOCTYPE html>
<html>
<head>
<title>ATV Exchange - Profile</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css?v=20260607paystackdebug1">
</head>

<body>
<div class="app page-shell">
<div class="page-topbar">
<button class="back-btn" onclick="goToPage('settings.html')">Back</button>
<div><span class="admin-kicker">Account</span><h2>Profile</h2></div>
</div>

<div class="card">
<h3>Account Details</h3>
<div id="profileTransferUidCard" class="uid-card hidden">
<span>ATV Transfer UID</span>
<b id="profileTransferUid">Generating...</b>
<button type="button" onclick="copyMyTransferUid()">Copy UID</button>
<small>Permanent ID for receiving internal transfers.</small>
</div>
<div class="profile-summary-grid">
<div><span>Full Name</span><b id="profileFullNameText">Loading...</b></div>
<div><span>Username</span><b id="profileUsernameText">Loading...</b></div>
<div><span>Email</span><b id="profileEmailText">Loading...</b></div>
<div><span>Phone</span><b id="profilePhoneText">Loading...</b></div>
<div><span>Country</span><b id="profileCountryText">Not set</b></div>
<div><span>Date Joined</span><b id="profileDateJoinedText">Loading...</b></div>
<div><span>Account Tier</span><b id="profileTierBadge">Basic</b><small id="profileVipBadge" class="vip-badge hidden">VIP1</small></div>
<div><span>Account Status</span><b id="profileAccountStatusText">Active</b></div>
</div>
<input id="profileFirstName" placeholder="First Name">
<input id="profileMiddleName" placeholder="Middle Name">
<input id="profileLastName" placeholder="Last/Surname">
<input id="profileUsername" placeholder="Username (optional)">
<input id="profilePhone" placeholder="Phone Number">
<input id="profileEmail" type="email" placeholder="Email Address">
<select id="profileCountry" onchange="updateIdTypes()">
<option value="">Select Country</option>
</select>
<input id="profileAddress" placeholder="Address">
</div>

<button onclick="saveProfile()">Save Profile</button>
<div id="profileStatus"></div>
<div id="profileNextStep" class="help"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="./app.js?v=20260607paystackdebug1"></script>
</body>
</html>
